name: Deploy BEN Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      # 1. Чекаутим main — там и доки, и код
      - name: Checkout Main
        uses: actions/checkout@v4

      # 2. Настройка Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Установка зависимостей
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material mkdocstrings[python]
          pip install pandas numpy faker pytest aiogram httpx aiosqlite aiohttp-socks fastapi

      # 4. Создаём __init__.py чтобы Python видел модули
      - name: Force Python Packages
        run: |
          touch backend/__init__.py
          touch tests/__init__.py

      # 5. Сборка и деплой на GitHub Pages
      - name: Build and Deploy
        run: mkdocs gh-deploy --force
        env:
          PYTHONPATH: ".:./backend:./bot:./tests"